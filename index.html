<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gearnest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #000;
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
}

header h2 {
    color: #ff7a00;
}

/* BANNER SLIDER */
.slider {
    position: relative;
    width: 100%;
    height: 250px;
    overflow: hidden;
}

.slides {
    display: flex;
    width: 300%;
    animation: slide 10s infinite;
}

.slide {
    width: 100%;
    flex-shrink: 0;
}

.slide img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* SLIDE ANIMATION */
@keyframes slide {
    0% { transform: translateX(0); }
    33% { transform: translateX(0); }
    40% { transform: translateX(-100%); }
    66% { transform: translateX(-100%); }
    73% { transform: translateX(-200%); }
    100% { transform: translateX(-200%); }
}

/* SECTION */
.section {
    padding: 30px 20px;
}

.section h3 {
    margin-bottom: 15px;
}

/* PRODUCT */
.product {
    background: white;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.product img {
    width: 100%;
    max-width: 200px;
}

.price {
    color: #ff7a00;
    font-weight: bold;
    margin: 10px 0;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 15px;
    background: #25D366;
    color: white;
    border-radius: 5px;
    text-decoration: none;
}

/* FOOTER */
footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 12px 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <h2>Gearnest</h2>
</header>

<!-- 🔥 BANNER SLIDER (You can change images later) -->
<div class="slider">
    <div class="slides">
        <div class="slide">
            <img src="https://via.placeholder.com/800x250?text=Your+Banner+1">
        </div>
        <div class="slide">
            <img src="https://via.placeholder.com/800x250?text=Your+Banner+2">
        </div>
        <div class="slide">
            <img src="https://via.placeholder.com/800x250?text=Your+Banner+3">
        </div>
    </div>
</div>

<!-- 🔥 SINGLE PRODUCT -->
<section class="section">
    <h3>Our Product</h3>

    <div class="product">
        <img src="https://via.placeholder.com/200">

        <h4>Product Name</h4>

        <p class="price">৳1500</p>

        <!-- WhatsApp Order Button -->
        <a href="https://wa.me/8801864567552?text=I%20want%20to%20order%20this%20product"
           class="btn">
           Order via WhatsApp
        </a>
    </div>
</section>

<footer>
    <p>© 2026 Gearnest | All Rights Reserved</p>
</footer>

<!-- FLOAT WHATSAPP -->
<a class="whatsapp"
   href="https://wa.me/8801864567552"
   target="_blank">💬</a>

</body>
</html>
